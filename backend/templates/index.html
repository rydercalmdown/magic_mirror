<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Magic Mirror Backend Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="max-w-6xl mx-auto p-6 space-y-6">
      <div>
        <h1 class="text-2xl font-semibold">Magic Mirror Debug Dashboard</h1>
        <p class="text-sm text-gray-500">Live view of backend events and state. Port: <span id="port" class="font-mono"></span></p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-5">
          <h2 class="text-lg font-semibold">Presence</h2>
          <div class="mt-3 flex items-center gap-2 text-sm">
            <span class="text-gray-500">Status:</span>
            <span id="personStatus" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">—</span>
          </div>
          <div class="mt-2 flex items-center gap-2 text-sm">
            <span class="text-gray-500">FPS:</span>
            <span id="fps" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-800">—</span>
          </div>
          <div class="mt-4 flex items-center gap-3">
            <button id="startWebcam" class="px-3 py-1.5 rounded-md bg-indigo-600 text-white text-sm hover:bg-indigo-500">Start Webcam</button>
            <button id="stopWebcam" class="px-3 py-1.5 rounded-md bg-gray-200 text-gray-900 text-sm hover:bg-gray-300">Stop Webcam</button>
          </div>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-5">
          <h2 class="text-lg font-semibold">Habits</h2>
          <div class="grid grid-cols-2 gap-x-4 text-sm text-gray-500 mt-2 mb-3">
            <div class="">Date</div><div id="date" class="text-gray-900"></div>
            <div class="">Completed</div><div id="progress" class="text-gray-900"></div>
          </div>
          <div id="habits" class="divide-y divide-gray-100"></div>
        </div>
      </div>

      <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-5">
        <h2 class="text-lg font-semibold">Backend</h2>
        <div class="grid grid-cols-3 gap-4 text-sm mt-2">
          <div class="text-gray-500">Socket</div><div id="socketState" class="col-span-2">connecting…</div>
          <div class="text-gray-500">Random Number</div><div id="randomNumber" class="col-span-2">—</div>
          <div class="text-gray-500">Health</div><div id="health" class="col-span-2">—</div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
          <div>
            <h3 class="text-sm text-gray-500 mb-2">Live Preview</h3>
            <img id="stream" class="w-full rounded-lg bg-black" alt="Webcam stream"/>
          </div>
          <div>
            <h3 class="text-sm text-gray-500 mb-2">Controls</h3>
            <div class="flex items-center gap-3">
              <button id="startTest" class="px-3 py-1.5 rounded-md bg-indigo-600 text-white text-sm hover:bg-indigo-500">Start Test</button>
              <button id="stopTest" class="px-3 py-1.5 rounded-md bg-gray-200 text-gray-900 text-sm hover:bg-gray-300">Stop Test</button>
            </div>
            <div class="mt-4 flex items-center gap-2 text-sm">
              <span class="text-gray-500">Current Action:</span>
              <span id="currentAction" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">—</span>
            </div>
            <div class="mt-4">
              <h3 class="text-sm text-gray-500 mb-2">Recent Actions</h3>
              <div id="actions" class="text-sm divide-y divide-gray-100"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
    <script>
      const PORT = {{ port }};
      const BASE = `${location.protocol}//${location.hostname}:${PORT}`;
      document.getElementById('port').textContent = PORT;
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const todayStr = `${yyyy}-${mm}-${dd}`;
      document.getElementById('date').textContent = todayStr;

      // Stream URL
      document.getElementById('stream').src = `${BASE}/stream`;

      // Socket.IO
      const socket = io(BASE, {
        transports: ['websocket'],
        upgrade: false,
      });
      const socketState = document.getElementById('socketState');
      const personStatus = document.getElementById('personStatus');
      const currentAction = document.getElementById('currentAction');
      const fpsEl = document.getElementById('fps');
      const randomNumber = document.getElementById('randomNumber');

      function setPersonStatus(detected) {
        personStatus.textContent = detected ? 'Person detected' : 'No person';
        personStatus.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + (detected ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800');
      }

      socket.on('connect', () => {
        socketState.textContent = 'connected';
        socketState.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800';
      });
      socket.on('disconnect', () => {
        socketState.textContent = 'disconnected';
        socketState.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800';
      });
      socket.on('webcamStatus', (status) => {
        if (status && typeof status.personDetected === 'boolean') {
          setPersonStatus(status.personDetected);
        }
        if (status && typeof status.fps === 'number') {
          fpsEl.textContent = `${status.fps} fps`;
        }
      });
      socket.on('randomNumber', (data) => {
        randomNumber.textContent = data.number;
      });
      socket.on('personDetection', (data) => {
        setPersonStatus(!!data.detected);
      });
      socket.on('currentAction', (data) => {
        currentAction.textContent = data && data.label ? data.label : '—';
      });
      socket.on('habitUpdated', (data) => {
        if (data && data.habits) {
          renderHabits(data.habits);
        }
      });

      // REST helpers
      async function getJSON(url, opts) {
        const res = await fetch(url, opts);
        return await res.json();
      }

      async function refreshHealth() {
        try {
          const h = await getJSON(`${BASE}/api/health`);
          document.getElementById('health').textContent = h.status;
        } catch (e) {
          document.getElementById('health').textContent = 'error';
        }
      }

      async function loadWebcamStatus() {
        try {
          const s = await getJSON(`${BASE}/api/webcam/status`);
          if (s && typeof s.personDetected === 'boolean') {
            setPersonStatus(s.personDetected);
          }
          if (s && typeof s.fps === 'number') {
            fpsEl.textContent = `${s.fps} fps`;
          }
        } catch (e) {}
      }

      async function loadHabits() {
        const data = await getJSON(`${BASE}/api/habits?date=${todayStr}`);
        renderHabits(data.habits || []);
      }

      async function loadActions() {
        try {
          const data = await getJSON(`${BASE}/api/actions`);
          const list = data.items || [];
          const wrap = document.getElementById('actions');
          wrap.innerHTML = '';
          list.slice(0, 10).forEach(item => {
            const row = document.createElement('div');
            row.className = 'py-2 flex items-center justify-between';
            const label = item.label || '—';
            const ms = `${item.mediapipe_ms ?? 0}ms / ${item.classify_ms ?? 0}ms`;
            row.innerHTML = `
              <div class="flex items-center gap-3">
                <span class="font-mono text-gray-500">${Math.round(item.start_ts || 0)}</span>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${label ? 'bg-indigo-100 text-indigo-800' : 'bg-gray-100 text-gray-800'}">${label || 'unknown'}</span>
              </div>
              <div class="text-xs text-gray-500">${ms}</div>
            `;
            wrap.appendChild(row);
          });
        } catch (e) {}
      }

      function renderHabits(habits) {
        const wrap = document.getElementById('habits');
        wrap.innerHTML = '';
        let completed = 0;
        habits.forEach(h => {
          if (h.completed) completed++;
          const div = document.createElement('div');
          div.className = 'flex items-center justify-between py-2';
          div.innerHTML = `
            <div class="flex items-center gap-3">
              <input type="checkbox" ${h.completed ? 'checked' : ''} class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"/>
              <span class="${h.completed ? 'line-through text-gray-400' : ''}">${h.name}</span>
            </div>
          `;
          div.addEventListener('click', () => toggleHabit(h.name, habits));
          wrap.appendChild(div);
        });
        document.getElementById('progress').textContent = `${completed}/${habits.length}`;
      }

      async function toggleHabit(name, habits) {
        const idx = habits.findIndex(h => h.name === name);
        if (idx >= 0) {
          habits[idx].completed = !habits[idx].completed;
          await getJSON(`${BASE}/api/habits`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ habits, date: todayStr })
          });
          renderHabits(habits);
        }
      }

      // Buttons
      document.getElementById('startWebcam').addEventListener('click', () => {
        fetch(`${BASE}/api/webcam/start`, { method: 'POST' });
      });
      document.getElementById('stopWebcam').addEventListener('click', () => {
        fetch(`${BASE}/api/webcam/stop`, { method: 'POST' });
      });
      document.getElementById('startTest').addEventListener('click', () => {
        fetch(`${BASE}/api/test/start`, { method: 'POST' });
      });
      document.getElementById('stopTest').addEventListener('click', () => {
        fetch(`${BASE}/api/test/stop`, { method: 'POST' });
      });

      // Initial load
      refreshHealth();
      loadHabits();
      loadWebcamStatus();
      setInterval(loadWebcamStatus, 1000);
      setInterval(loadActions, 1500);
    </script>
  </body>
  </html>
